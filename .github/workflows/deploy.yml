name: Deploy to MiniPC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x ./server_springBoot/portfolio/gradlew

      - name: Build Spring Boot app
        run: |
          cd ./server_springBoot/portfolio
          ./gradlew bootJar -x test --no-daemon --info

      - name: Deploy to MiniPC
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.MINIPC_HOST }}
          username: ${{ secrets.MINIPC_USER }}
          key: ${{ secrets.MINIPC_SSH_KEY }}
          port: 22
          script: |
            cd ~/React_QbixPortfolio
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            bash infra/scripts/install_minipc_assets.sh
            bash infra/scripts/deploy_blue_green.sh
